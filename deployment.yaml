apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
      - name: app
        image: gurvannbrenne/app:1.0.0
        ports:
        - containerPort: 3000
        volumeMounts:
          - name: config-volume
            mountPath: /app/config/
      volumes:
        - name: config-volume
          configMap:
            name: app-config
